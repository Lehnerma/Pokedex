<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/img/pokecoin.svg" type="image/x-icon" />

    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./styles/colors.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/pokedex.css" />
    <link rel="stylesheet" href="./styles/landing.css" />
    <link rel="stylesheet" href="./styles/card.css" />
    <link rel="stylesheet" href="./styles/utilities.css" />

    <script src="./scipts/templets.js"></script>
    <script src="./scipts/utilities.js"></script>
    <script src="./scipts/data.js"></script>
    <script src="./scipts/card.js"></script>
    <script src="./scipts/script.js"></script>

    <title>Pokedex</title>
  </head>
  <body onload="init()" class="ope">
    <header id="pokedex-header">
      <div class="header-container max-dp">
        <span class="head-faces1"></span>
        <h1 class="dp-lg">Pokedex</h1>
        <span class="head-faces2"></span>
      </div>
      <button class="ball-btn" id="ball_btn">
        <h2 class="ball-title">Pokedex</h2>
      </button>
    </header>

    <main class="max-dp">
      <nav class="nav-main">
        <section class="search-container">
          <div class="search-box">
            <input type="text" id="search_input" placeholder="🔍 for Pokemon.." />
            <button class="btn reset-search" id="reset_btn"></button>
          </div>
          <button class="btn search-btn" id="search_btn"></button>
        </section>
        <button onclick="getPokemons()" class="btn load-more">load more pokemon</button>
      </nav>

      <div class="pokedex" id="pokedex"></div>

      <dialog id="pokecard_dialog" class="pokecard-dialog card-shimmer-border">
        <div class="pokemon-card">
          <h3 class="pokemon-card--name title" id="card_name"></h3>
          <section class="sprite-container glass" id="type_bg">
            <div class="card-inner">
              <img src="" alt="sprite-front" id="sprite_front" class="sprite-front" />
              <img src="" alt="sprite-back" id="sprite_back" class="sprite-back" />
            </div>
            <img src="./assets/img/type_modern/Water.svg" alt="type" id="type_modern" class="type" />
          </section>
          <section class="pokemon-card--basic glass">
            <p id="number" class="pokemon-card--id">#0</p>
            <p id="height">HT.</p>
            <p id="weight">WT.</p>
          </section>
          <article class="pokemon-card--main glass">
            <nav class="pokemon-card--nav">
              <ul>
                <li id="stats" class="li-left tab" onclick="loadContent(`stats`)">Stats</li>
                <li id="evolution" class="tab" onclick="loadContent(`evolution`)">Evoulution</li>
                <li id="dex" class="li-right tab activ" onclick="loadContent(`dex`)">Pokedex</li>
              </ul>
            </nav>
            <section class="content stats-container" id="stats_container"></section>
            <section class="content evolution-container d-none" id="evolution_container"></section>
            <section class="content dex-container d-none" id="dex_container">
              <img src="/assets/img/pokedex.svg" alt="pokedex" class="dex" />
              <p class="pokedex-info" id="pokedex_info"></p>
            </section>
          </article>
          <section class="main-nav-container">
            <button class="main-nav-btn left" id="left"></button>
            <button class="main-nav-btn close" id="close" onclick="closePokeCard()"></button>
            <button class="main-nav-btn right" id="right"></button>
          </section>
        </div>
      </dialog>

      <dialog id="loading_screen" class="loading-screen">
        <img src="./assets/img/loading_pikatchu.gif" alt="Pikatchu running on a Pokeball" />
      </dialog>
    </main>

    <footer id="pokedex-footer">
      <section class="footer-container">
        <p>by:</p>
        <img src="./assets/img/lm_logo.png" alt="logo" class="logo" />
        <p>Maximilian Lehner <br />2026</p>
      </section>
    </footer>
  </body>
</html>
