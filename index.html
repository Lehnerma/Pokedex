<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/img/pokecoin.svg" type="image/x-icon" />

    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./styles/utilitys.css" />
    <link rel="stylesheet" href="./styles/colors.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/pokedex.css" />
    <link rel="stylesheet" href="./styles/landing.css" />
    <link rel="stylesheet" href="./styles/card.css" />

    <script src="./scipts/data.js"></script>
    <script src="./scipts/templets.js"></script>
    <script src="./scipts/auxiliary.js"></script>
    <script src="./scipts/script.js"></script>

    <title>Pokedex</title>
  </head>
  <!-- open class entfernen um den ball normal zu offnen. -->
  <body onload="init()" class="open">
    <header id="pokedex-header">
      <div class="header-container max-dp">
        <span class="head-faces1"></span>
        <h1 class="dp-lg">Pokedex</h1>
        <span class="head-faces2"></span>
      </div>
      <button class="ball-btn" id="ball_btn">
        <h2 class="ball-title">Pokedex</h2>
      </button>
    </header>

    <main class="max-dp">
      <article class="testing">
        <section class="pokedex-serch">
          <input type="text" id="search_input" placeholder="Pokemon" />
          <button>🔍</button>
        </section>
      </article>
      <div class="pokedex" id="pokedex"></div>

        <dialog id="pokecard_dialog" class="pokecard-dialog card-shimmer-border " open>
          <!-- template creating -->
          <div class="pokemon-card ">

              <h3 class="pokemon-card--name title">Name</h3>

              <section class="pokemon-card--img-container glass">
                <img src="/assets/img/654.png" alt="sprite-front pokemon-name" class="sprite-front" />
                <img src="./assets/img/type_modern/Water.svg" alt="type fire" class="type">
              </section>

              <section class="pokemon-card--basic glass">
                <p class="pokemon-card--id">#4</p>
                <p>HT. 0,70</p>
                <p>WT. 0,70</p>
              </section>

              <article class="pokemon-card--main glass">
                <nav class="pokemon-card--nav">
                  <ul>
                    <li class="li-left activ">Stats</li>
                    <li class="li-middl acti">Evoulution</li>
                    <li class="li-right acti">Pokedex</li>
                  </ul>
                </nav>
                <section class="stats-container">
                  <div class="stat-container">
                    <label for="stat_hp" class="stat-title">HP</label>
                    <p class="stat-value">50</p>
                    <progress id="stat_hp" value="50" max="255" class="stat-progress"></progress>
                  </div>
                  <div class="stat-container">
                    <label for="stat_ang" class="stat-title">ANG</label>
                    <p class="stat-value">50</p>
                    <progress id="stat_ang" value="150" max="255" class="stat-progress"></progress>
                  </div>
                  <div class="stat-container">
                    <label for="stat_spAng" class="stat-title">SP ANG</label>
                    <p class="stat-value">50</p>
                    <progress id="stat_spAng" value="250" max="255" class="stat-progress"></progress>
                  </div>
                  <div class="stat-container">
                    <label for="stat_def" class="stat-title">DEF</label>
                    <p class="stat-value">50</p>
                    <progress id="stat_def" value="180" max="255" class="stat-progress"></progress>
                  </div>
                  <div class="stat-container">
                    <label for="stat_spDef" class="stat-title">SP DEF</label>
                    <p class="stat-value">50</p>
                    <progress id="stat_spDef" value="50" max="255" class="stat-progress"></progress>
                  </div>
                  <div class="stat-container">
                    <label for="stat_speed" class="stat-title">SPEED</label>
                    <p class="stat-value">50</p>
                    <progress id="stat_speed" value="50" max="255" class="stat-progress"></progress>
                  </div>
                </section>

                <section class="pokemon-card--pokedex-container d-none">
                  <img src="/assets/img/pokedex.svg" alt="pokedex">
                  <p class="pomeon-card--pokedex-info">Spits fire that is hot enough to melt boulders. Known to cause forest fires unintentionally</p>
                </section>

                <section class="pokemon-card--evolution d-none">
                  <img src="" alt="">
                </section>
              </article>

            <!-- template ending -->
            </div>
        </dialog>

        <dialog id="loading_screen" class="loading-screen">
          <img src="./assets/img/loading_pikatchu.gif" alt="Pikatchu running on a Pokeball" />
        </dialog>
      </div>
    </main>

    <footer id="pokedex-footer">
      <div class="test-div">
        <button onclick="getPokemons()">load pokemon</button>
        <button onclick="openPokeCard()">Open dialog</button>
        <button onclick="openLoadingScreen()">loading</button>
        <button onclick="saveToLocal()">save Local</button>
        <button onclick="loadFromLocal()">load Local</button>
      </div>
    </footer>
  </body>
</html>
